<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>ACTION</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #e5e7ea;
  height: 100vh;
  display: flex;
  flex-direction: column;
}

/* TOPO */
.topo {
  width: 100%;
  background: #d9d9d9;
  text-align: center;
  padding: 18px;
  font-weight: bold;
  color: #1c4d8c;
  font-size: 22px;
}

/* CENTRAL */
.container {
  flex: 1;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* CARD */
.card {
  width: 100%;
  max-width: 440px;
  background: white;
  padding: 45px 35px;
  border-radius: 28px;
  box-shadow: 0 20px 50px rgba(0,0,0,0.15);
}

/* LOGO */
.logo {
  text-align: center;
  font-size: 44px;
  color: #1c78c0;
  font-style: italic;
  margin-bottom: 10px;
}

/* TEXTO */
.subtexto {
  text-align: center;
  color: #666;
  margin-bottom: 30px;
  font-size: 15px;
}

/* INPUT COM ÍCONE */
.input-group {
  position: relative;
  margin-bottom: 16px;
}

.input-group span {
  position: absolute;
  left: 15px;
  top: 50%;
  transform: translateY(-50%);
  color: #aaa;
}

.input {
  width: 100%;
  padding: 18px 18px 18px 45px;
  background: #2c2c2c;
  color: white;
  border: none;
  border-radius: 14px;
  font-size: 16px;
  box-sizing: border-box;
}

/* BOTÃO */
.botao {
  width: 100%;
  padding: 18px;
  border: none;
  background: #c0c7cf;
  color: white;
  border-radius: 14px;
  font-size: 16px;
  margin-top: 12px;
  transition: 0.3s;
}

.botao-ativo {
  background: #0078D4;
  cursor: pointer;
}

.botao-ativo:hover {
  background: #005fa3;
}

.voltar {
  background: #8a8a8a;
}

/* TELAS */
.tela {
  display: none;
}
</style>
</head>

<body>

<div class="topo">ACTEGA</div>

<div class="container">

<!-- LOGIN -->
<div id="login" class="card tela">

  <div class="logo">ACTION</div>

  <div class="subtexto">
    Identifique-se para iniciar o registro.
  </div>

  <div class="input-group">
    <span>👤</span>
    <input class="input" id="matricula" placeholder="Matrícula" oninput="validarLogin()">
  </div>

  <div class="input-group">
    <span>✍️</span>
    <input class="input" id="nome" placeholder="Nome completo" oninput="validarLogin()">
  </div>

  <button id="btnLogin" class="botao" onclick="login()" disabled>Continuar</button>

  <button class="botao voltar" onclick="mostrar('adminLogin')">Admin</button>

</div>

<!-- ADMIN -->
<div id="adminLogin" class="card tela">

  <h3>Área Administrativa</h3>

  <div class="input-group">
    <span>🔒</span>
    <input class="input" id="senhaAdmin" type="password" placeholder="Senha">
  </div>

  <button class="botao botao-ativo" onclick="loginAdmin()">Entrar</button>
  <button class="botao voltar" onclick="mostrar('login')">⬅ Voltar</button>

</div>

<!-- DASHBOARD -->
<div id="dashboard" class="card tela">

  <h3>📊 Dashboard</h3>

  <div id="indicadores"></div>

  <button class="botao voltar" onclick="mostrar('login')">⬅ Voltar</button>

</div>

<!-- SETOR -->
<div id="setorTela" class="card tela">

  <h3>Selecione o setor</h3>

  <select id="setor" class="input">
    <option>Tintas</option>
    <option>Vernizes</option>
    <option>Logística</option>
    <option>Laboratório</option>
    <option>ADM</option>
    <option>PCP</option>
    <option>Manutenção</option>
  </select>

  <button class="botao botao-ativo" onclick="proximo()">Continuar</button>
  <button class="botao voltar" onclick="mostrar('login')">⬅ Voltar</button>

</div>

<!-- TIPO -->
<div id="tipoTela" class="card tela">

  <h3>Tipo de registro</h3>

  <button class="botao botao-ativo" onclick="definirTipo('Ideia')">💡 Ideia</button>
  <button class="botao botao-ativo" onclick="definirTipo('Risco')">⚠️ Risco</button>

  <button class="botao voltar" onclick="mostrar('setorTela')">⬅ Voltar</button>

</div>

<!-- DESCRIÇÃO -->
<div id="descricao" class="card tela">

  <h3>Descreva</h3>

  <textarea class="input" id="problema" placeholder="Problema"></textarea>
  <textarea class="input" id="sugestao" placeholder="Sugestão"></textarea>

  <button class="botao botao-ativo" onclick="finalizar()">Enviar</button>
  <button class="botao voltar" onclick="mostrar('tipoTela')">⬅ Voltar</button>

</div>

<!-- FINAL -->
<div id="final" class="card tela">

  <h2>✅ Enviado</h2>
  <p>+10 pontos</p>

  <button class="botao botao-ativo" onclick="reiniciar()">Finalizar</button>

</div>

</div>

<script>
let dados = {};
let tipo = "";
let registros = JSON.parse(localStorage.getItem("registros")) || [];

function mostrar(tela) {
  document.querySelectorAll(".tela").forEach(t => t.style.display = "none");
  document.getElementById(tela).style.display = "block";
}

mostrar("login");

// 🔵 valida botão ativar
function validarLogin() {
  const btn = document.getElementById("btnLogin");

  if (matricula.value && nome.value) {
    btn.disabled = false;
    btn.classList.add("botao-ativo");
  } else {
    btn.disabled = true;
    btn.classList.remove("botao-ativo");
  }
}

// LOGIN
function login() {
  dados = { matricula: matricula.value, nome: nome.value };
  mostrar("setorTela");
}

// ADMIN
function loginAdmin() {
  if (senhaAdmin.value === "admin123") {
    gerarDashboard();
    mostrar("dashboard");
  } else {
    alert("Senha incorreta");
  }
}

// DASHBOARD
function gerarDashboard() {
  let total = registros.length;
  let ideias = registros.filter(r => r.tipo === "Ideia").length;
  let riscos = registros.filter(r => r.tipo === "Risco").length;

  indicadores.innerHTML = `
    <p>Total: ${total}</p>
    <p>Ideias: ${ideias}</p>
    <p>Riscos: ${riscos}</p>
  `;
}

// FLUXO
function proximo() {
  dados.setor = setor.value;
  mostrar("tipoTela");
}

function definirTipo(t) {
  tipo = t;
  mostrar("descricao");
}

function finalizar() {
  if (problema.value.length < 10 || sugestao.value.length < 10) {
    alert("Descreva melhor");
    return;
  }

  registros.push({
    nome: dados.nome,
    setor: dados.setor,
    tipo: tipo
  });

  localStorage.setItem("registros", JSON.stringify(registros));
  mostrar("final");
}

function reiniciar() {
  location.reload();
}
</script>

</body>
</html>
``
