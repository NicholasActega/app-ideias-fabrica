<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>ACTION</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f4f6f8;
  height: 100vh;
  display: flex;
  flex-direction: column;
}

/* TOPO */
.topo {
  width: 100%;
  background: white;
  border-bottom: 1px solid #e3e6e8;
  text-align: center;
  padding: 18px;
  font-weight: bold;
  color: #1c4d8c;
  font-size: 22px;
}

/* BARRA */
.barra-container {
  width: 100%;
  height: 5px;
  background: #dfe6ee;
}

.barra {
  height: 5px;
  width: 20%;
  background: #1c78c0;
  transition: width 0.4s ease;
}

/* CENTRAL */
.container {
  flex: 1;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* CARD */
.card {
  width: 90%;
  max-width: 440px;
  background: white;
  padding: 40px 30px;
  border-radius: 25px;
  box-shadow: 0 12px 35px rgba(0,0,0,0.12);
  box-sizing: border-box;
}

/* LOGO */
.logo {
  text-align: center;
  font-size: 42px;
  color: #1c78c0;
  font-style: italic;
  margin-bottom: 10px;
}

/* TEXTO */
.subtexto {
  text-align: center;
  color: #667;
  margin-bottom: 25px;
}

/* INPUT */
.input {
  width: 100%;
  box-sizing: border-box;
  padding: 16px;
  background: #2c2c2c;
  color: white;
  border: none;
  border-radius: 14px;
  margin-bottom: 14px;
}

/* BOTÕES */
.botao {
  width: 100%;
  box-sizing: border-box;
  padding: 16px;
  border: none;
  border-radius: 14px;
  margin-top: 10px;
  color: white;
}

.botao-principal {
  background: linear-gradient(135deg, #5fa8ff, #1c78c0);
}

.botao-principal:hover {
  background: #1c78c0;
}

.botao-secundario {
  background: linear-gradient(135deg, #8bbcf4, #5a95d6);
}

.voltar {
  background: #8a8a8a;
}

/* LISTA SETOR */
.lista {
  display: flex;
  flex-direction: column;
  gap: 12px;
  max-height: 350px;
  overflow-y: auto; /* ✅ rolagem se necessário */
}

.item {
  padding: 15px;
  border: 2px solid #d0d7de;
  border-radius: 12px;
  display: flex;
  justify-content: space-between;
  cursor: pointer;
  background: white;
}

.item.ativo {
  border-color: #0078D4;
  color: #0078D4;
  font-weight: bold;
}

/* TELAS */
.tela {
  display: none;
}
</style>
</head>

<body>

<div class="topo">ACTEGA</div>

<div class="barra-container">
  <div id="barraProgresso" class="barra"></div>
</div>

<div class="container">

<!-- LOGIN -->
<div id="login" class="card tela">

  <div class="logo">ACTION</div>

  <div class="subtexto">
    Identifique-se para iniciar o registro.
  </div>

  <input class="input" id="matricula" placeholder="Matrícula">
  <input class="input" id="nome" placeholder="Nome completo">

  <button class="botao botao-principal" onclick="login()">Continuar</button>
  <button class="botao botao-secundario" onclick="mostrar('adminLogin')">Admin</button>

</div>

<!-- SETOR -->
<div id="setorTela" class="card tela">

  <h3>Setor:</h3>

  <div class="lista">

    <div class="item" onclick="selecionarSetor('ADM', this)">ADM <span>›</span></div>
    <div class="item" onclick="selecionarSetor('Coatings ARA II', this)">Coatings ARA II <span>›</span></div>
    <div class="item" onclick="selecionarSetor('Lab ARA I', this)">Lab ARA I <span>›</span></div>
    <div class="item" onclick="selecionarSetor('Lab ARA II', this)">Lab ARA II <span>›</span></div>
    <div class="item" onclick="selecionarSetor('Manutenção ARA I', this)">Manutenção ARA I <span>›</span></div>
    <div class="item" onclick="selecionarSetor('Manutenção ARA II', this)">Manutenção ARA II <span>›</span></div>
    <div class="item" onclick="selecionarSetor('PCP / Logística ARA I', this)">PCP / Logística ARA I <span>›</span></div>
    <div class="item" onclick="selecionarSetor('PCP / Logística ARA II', this)">PCP / Logística ARA II <span>›</span></div>
    <div class="item" onclick="selecionarSetor('Tintas', this)">Tintas <span>›</span></div>
    <div class="item" onclick="selecionarSetor('Vedantes', this)">Vedantes <span>›</span></div>

  </div>

  <button class="botao voltar" onclick="mostrar('login')">Voltar</button>

</div>

</div>

<script>
let dados = {};

function mostrar(tela) {
  document.querySelectorAll(".tela").forEach(t => t.style.display = "none");
  document.getElementById(tela).style.display = "block";

  let progresso = 20;
  if (tela === "setorTela") progresso = 40;

  barraProgresso.style.width = progresso + "%";
}

mostrar("login");

function login() {
  if (!matricula.value || !nome.value) {
    alert("Preencha tudo!");
    return;
  }
  mostrar("setorTela");
}

function selecionarSetor(valor, el) {
  document.querySelectorAll(".item").forEach(i => i.classList.remove("ativo"));
  el.classList.add("ativo");
  dados.setor = valor;
}
</script>

</body>
</html>
