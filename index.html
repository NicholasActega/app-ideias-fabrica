<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>ACTION - Melhoria Contínua</title>

<style>
body {
  font-family: Arial;
  background: #e6eef7;
  margin: 0;
}

/* HEADER */
.header {
  background: #0a2f5c;
  color: white;
  padding: 15px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.logo {
  height: 40px;
}

.titulo {
  font-size: 24px;
  font-weight: bold;
}

/* TELAS */
.tela {
  display: none;
  max-width: 600px;
  margin: auto;
  margin-top: 20px;
}

/* CARDS */
.card {
  background: white;
  border-radius: 12px;
  padding: 20px;
  margin-bottom: 15px;
}

/* INPUTS */
input, textarea, select {
  width: 100%;
  padding: 15px;
  font-size: 18px;
  margin: 10px 0;
}

/* BOTÕES GRANDES */
button {
  width: 100%;
  padding: 18px;
  font-size: 18px;
  margin-top: 10px;
  border: none;
  border-radius: 10px;
  background: #0078D4;
  color: white;
  font-weight: bold;
}

/* BOTÕES DIFERENTES */
.btn-secundario {
  background: #5a9bd5;
}

.btn-perigo {
  background: #d9534f;
}

/* DASHBOARD */
.card-info {
  background: #0078D4;
  color: white;
  font-size: 18px;
  margin: 5px;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div class="titulo">ACTION</div>

  <!-- 🔁 TROCAR PELO LOGO REAL -->
  <img src="https://via.placeholder.com/120x40?text=LOGO" class="logo">
</div>

<!-- LOGIN -->
<div id="login" class="tela">
  <div class="card">
    <h2>Login Operador</h2>
    <input id="matricula" placeholder="Digite sua matrícula">
    <input id="nome" placeholder="Nome completo">

    <button onclick="login()">Entrar</button>
    <button class="btn-secundario" onclick="suporte()">Preciso de Ajuda</button>

    <hr>
    <button class="btn-perigo" onclick="mostrar('adminLogin')">Admin</button>
  </div>
</div>

<!-- ADMIN -->
<div id="adminLogin" class="tela">
  <div class="card">
    <h2>Login Admin</h2>
    <input type="password" id="senhaAdmin" placeholder="Senha">
    <button onclick="loginAdmin()">Entrar</button>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="tela">
  <div class="card">
    <h2>Dashboard</h2>
    <div id="indicadores"></div>
  </div>

  <div class="card">
    <h3>Registros</h3>
    <div id="listaRegistros"></div>
  </div>

  <button onclick="voltarLogin()">Sair</button>
</div>

<!-- SETOR -->
<div id="setorTela" class="tela">
  <div class="card">
    <h2>Selecione o setor</h2>
    <select id="setor">
      <option>Tintas</option>
      <option>Vernizes</option>
      <option>Logística</option>
      <option>Laboratório</option>
      <option>ADM</option>
      <option>PCP</option>
      <option>Manutenção</option>
    </select>

    <button onclick="proximo('tipoTela')">Avançar</button>
  </div>
</div>

<!-- TIPO -->
<div id="tipoTela" class="tela">
  <div class="card">
    <h2>Escolha</h2>

    <button onclick="definirTipo('Ideia')">💡 Ideia de Melhoria</button>
    <button class="btn-perigo" onclick="definirTipo('Risco')">⚠️ Risco de Segurança</button>
  </div>
</div>

<!-- DESCRIÇÃO -->
<div id="descricao" class="tela">
  <div class="card">
    <h2>Descreva</h2>

    <textarea id="problema" placeholder="Descreva o problema"></textarea>
    <textarea id="sugestao" placeholder="Sugestão de melhoria"></textarea>

    <input type="file" id="foto">

    <button onclick="finalizar()">Enviar</button>
  </div>
</div>

<!-- FINAL -->
<div id="final" class="tela">
  <div class="card">
    <h2>✅ Enviado!</h2>
    <p>+10 pontos 🎉</p>
    <button onclick="reiniciar()">Finalizar</button>
  </div>
</div>

<script>
let dados = {};
let tipo = "";
let registros = JSON.parse(localStorage.getItem("registros")) || [];

function mostrar(tela) {
  document.querySelectorAll(".tela").forEach(t => t.style.display = "none");
  document.getElementById(tela).style.display = "block";
}

mostrar("login");

// LOGIN
function login() {
  let m = matricula.value;
  let n = nome.value;

  if (!m || !n) {
    alert("Preencha tudo");
    return;
  }

  dados = { matricula: m, nome: n };
  mostrar("setorTela");
}

// ADMIN
function loginAdmin() {
  if (senhaAdmin.value === "admin123") {
    gerarDashboard();
    mostrar("dashboard");
  } else {
    alert("Senha errada");
  }
}

// DASHBOARD
function gerarDashboard() {
  let total = registros.length;
  let ideias = registros.filter(r => r.tipo === "Ideia").length;
  let riscos = registros.filter(r => r.tipo === "Risco").length;

  indicadores.innerHTML = `
    <div class="card-info">Total: ${total}</div>
    <div class="card-info">Ideias: ${ideias}</div>
    <div class="card-info">Riscos: ${riscos}</div>
  `;

  let lista = "";
  registros.forEach(r => {
    lista += `<div class="card">
      ${r.id} | ${r.nome}<br>
      ${r.setor} - ${r.tipo}<br>
      ${r.problema}
    </div>`;
  });

  listaRegistros.innerHTML = lista;
}

// FLUXO
function proximo(tela) {
  dados.setor = setor.value;
  mostrar(tela);
}

function definirTipo(t) {
  tipo = t;
  mostrar("descricao");
}

// VALIDADOR
function validarTexto(t) {
  if (t.length < 15) return "Texto curto";

  let palavras = ["problema", "melhor", "risco", "reduzir", "processo"];
  let ok = palavras.some(p => t.toLowerCase().includes(p));

  if (!ok) return "Descreva melhor o problema";

  return null;
}

// FINALIZAR
function finalizar() {
  let p = problema.value;
  let s = sugestao.value;

  if (validarTexto(p)) {
    alert("Problema inválido");
    return;
  }

  if (validarTexto(s)) {
    alert("Sugestão inválida");
    return;
  }

  let novo = {
    id: "ID-" + (registros.length + 1),
    nome: dados.nome,
    setor: dados.setor,
    tipo: tipo,
    problema: p,
    sugestao: s,
    data: new Date().toLocaleString()
  };

  registros.push(novo);
  localStorage.setItem("registros", JSON.stringify(registros));

  mostrar("final");
}

// RESET
function reiniciar() {
  dados = {};
  tipo = "";

  matricula.value = "";
  nome.value = "";
  problema.value = "";
  sugestao.value = "";

  mostrar("login");
}

// SUPORTE
function suporte() {
  window.location.href = "mailto:SEUEMAIL@empresa.com";
}

function voltarLogin() {
  mostrar("login");
}
</script>

</body>
</html>
