<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>ACTION</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f4f6f8;
  display: flex;
  flex-direction: column;
  height: 100vh;
}

/* TOPO */
.topo {
  background: white;
  border-bottom: 1px solid #e0e0e0;
  text-align: center;
  padding: 18px;
  font-size: 22px;
  font-weight: bold;
  color: #1c4d8c;
}

/* BARRA */
.barra-container {
  height: 5px;
  background: #dfe6ee;
}
.barra {
  height: 5px;
  width: 20%;
  background: #1c78c0;
  transition: 0.4s;
}

/* CENTRO */
.container {
  flex: 1;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* CARD */
.card {
  width: 90%;
  max-width: 460px;
  background: white;
  padding: 30px;
  border-radius: 28px;
  box-shadow: 0 15px 40px rgba(0,0,0,0.12);
}

/* ✅ INPUT (ÚNICA ALTERAÇÃO) */
.input {
  width: 100%;
  padding: 16px;
  background: #2c2c2c;
  color: white;
  border: none;
  border-radius: 14px;
  margin-bottom: 14px;
  box-sizing: border-box; /* ✅ ADICIONADO */
}

/* ✅ TEXTAREA AJUSTADO */
.textarea {
  width: 100%;
  height: 130px;
  padding: 18px;
  background: #2c2c2c;
  color: white;
  border-radius: 18px;
  border: none;
  margin-top: 10px;
  margin-bottom: 18px;
  box-sizing: border-box;
  line-height: 1.4;
}

/* BOTÕES */
.botao {
  width: 100%;
  padding: 15px;
  border-radius: 14px;
  border: none;
  color: white;
  margin-top: 10px;
}

.principal {
  background: linear-gradient(135deg,#5fa8ff,#1c78c0);
}
.secundario {
  background: linear-gradient(135deg,#8bbcf4,#5a95d6);
}
.voltar-btn {
  background: #8a8a8a;
}

/* LISTA */
.lista {
  display: flex;
  flex-direction: column;
  gap: 10px;
  max-height: 300px;
  overflow-y: auto;
}

.item {
  padding: 14px;
  border: 2px solid #ddd;
  border-radius: 12px;
  display: flex;
  justify-content: space-between;
  cursor: pointer;
}

.item.ativo {
  border-color:#0078D4;
  color:#0078D4;
}

/* TIPO */
.item-tipo {
  padding:16px;
  border:2px solid #d0d7de;
  border-radius:14px;
  margin-bottom:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  cursor:pointer;
}

.item-tipo.ativo {
  border-color:#0078D4;
  background:#eef6ff;
}

.tipo-conteudo {
  display:flex;
  gap:12px;
  align-items:center;
}

.tipo-icone {
  width:40px;
  height:40px;
  border-radius:50%;
  background:#eef2f7;
  display:flex;
  justify-content:center;
  align-items:center;
}

.tipo-titulo {
  font-weight:bold;
}

.tipo-desc {
  font-size:13px;
  color:#667;
}

/* ✅ INFO MELHORADA */
.info {
  background:#e6f0fe;
  border:1px solid #bcd2f7;
  border-radius:14px;
  padding:15px;
  margin-bottom:20px;
  font-size:13px;
  color:#1c4d8c;
}

/* ✅ TITULOS */
.titulo {
  font-weight: bold;
  margin-top: 22px;
  margin-bottom: 8px;
}

/* ✅ SUPORTE */
.suporte-box {
  border:1px solid #d0d7de;
  border-radius:14px;
  padding:16px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-top:18px;
}

.suporte-texto {
  font-size:12px;
  color:#667;
}

/* FOOTER */
.footer {
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-top:25px;
}

.voltar-link {
  color:#667;
  cursor:pointer;
}

.botao-direita {
  width:50%;
}

.tela {display:none;}
</style>
</head>

<body>

<div class="topo">ACTEGA</div>
<div class="barra-container"><div id="barra" class="barra"></div></div>

<div class="container">

<!-- LOGIN -->
<div id="login" class="card tela">
  <h2 style="text-align:center;">ACTION</h2>

  <input class="input" id="matricula" placeholder="Matrícula">
  <input class="input" id="nome" placeholder="Nome">

  <button class="botao principal" onclick="login()">Continuar</button>
  <button class="botao secundario" onclick="mostrar('admin')">Admin</button>
</div>
