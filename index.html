<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>ACTION</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #e5e7ea;
  height: 100vh;
  display: flex;
  flex-direction: column;
}

/* TOPO */
.topo {
  width: 100%;
  background: #d9d9d9;
  text-align: center;
  padding: 18px;
  font-weight: bold;
  color: #1c4d8c;
  font-size: 22px;
}

/* BARRA */
.barra-container {
  width: 100%;
  height: 6px;
  background: #cfd8e3;
}

.barra {
  height: 6px;
  width: 20%;
  background: #1c78c0;
  transition: width 0.4s ease;
}

/* CENTRAL */
.container {
  flex: 1;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* CARD */
.card {
  width: 100%;
  max-width: 440px;
  background: white;
  padding: 45px 35px;
  border-radius: 28px;
  box-shadow: 0 20px 50px rgba(0,0,0,0.15);
}

/* LOGO */
.logo {
  text-align: center;
  font-size: 44px;
  color: #1c78c0;
  font-style: italic;
  margin-bottom: 10px;
}

/* TEXTO */
.subtexto {
  text-align: center;
  color: #666;
  margin-bottom: 30px;
  font-size: 15px;
}

/* INPUT */
.input {
  width: 100%;
  padding: 18px;
  background: #2c2c2c;
  color: white;
  border: none;
  border-radius: 14px;
  margin-bottom: 16px;
}

/* BOTÃO */
.botao {
  width: 100%;
  padding: 18px;
  border: none;
  background: #aab4bf;
  color: white;
  border-radius: 14px;
  margin-top: 12px;
}

/* VOLTAR */
.voltar {
  background: #8a8a8a;
}

/* LISTA SETOR */
.lista {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.item {
  padding: 15px;
  border: 2px solid #d0d7de;
  border-radius: 12px;
  display: flex;
  justify-content: space-between;
  cursor: pointer;
}

.item.ativo {
  border-color: #0078D4;
  color: #0078D4;
  font-weight: bold;
}

/* TELAS */
.tela {
  display: none;
}
</style>
</head>

<body>

<div class="topo">ACTEGA</div>
<div class="barra-container">
  <div id="barraProgresso" class="barra"></div>
</div>

<div class="container">

<!-- LOGIN -->
<div id="login" class="card tela">

  <div class="logo">ACTION</div>

  <div class="subtexto">
    Identifique-se para iniciar o registro.
  </div>

  <input class="input" id="matricula" placeholder="Matrícula">
  <input class="input" id="nome" placeholder="Nome completo">

  <button class="botao" onclick="login()">Continuar</button>
  <button class="botao voltar" onclick="mostrar('adminLogin')">Admin</button>
</div>

<!-- ADMIN -->
<div id="adminLogin" class="card tela">
  <h3>Admin</h3>
  <input class="input" id="senhaAdmin" type="password" placeholder="Senha">
  <button class="botao" onclick="loginAdmin()">Entrar</button>
  <button class="botao voltar" onclick="mostrar('login')">Voltar</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="card tela">
  <h3>Dashboard</h3>
  <div id="indicadores"></div>
  <button class="botao voltar" onclick="mostrar('login')">Voltar</button>
</div>

<!-- SETOR -->
<div id="setorTela" class="card tela">

  <h3>Setor:</h3>

  <div class="lista">
    <div class="item" onclick="selecionarSetor('ADM', this)">ADM <span>›</span></div>
    <div class="item" onclick="selecionarSetor('Coatings', this)">Coatings <span>›</span></div>
    <div class="item" onclick="selecionarSetor('Laboratório', this)">Laboratório <span>›</span></div>
    <div class="item" onclick="selecionarSetor('Manutenção', this)">Manutenção <span>›</span></div>
    <div class="item" onclick="selecionarSetor('Logística', this)">Logística <span>›</span></div>
    <div class="item" onclick="selecionarSetor('Tintas', this)">Tintas <span>›</span></div>
  </div>

  <button class="botao voltar" onclick="mostrar('login')">Voltar</button>
</div>

<!-- TIPO -->
<div id="tipoTela" class="card tela">
  <h3>Tipo</h3>
  <button class="botao" onclick="definirTipo('Ideia')">💡 Ideia</button>
  <button class="botao" onclick="definirTipo('Risco')">⚠️ Risco</button>
  <button class="botao voltar" onclick="mostrar('setorTela')">Voltar</button>
</div>

<!-- DESCRIÇÃO -->
<div id="descricao" class="card tela">
  <h3>Descrição</h3>
  <textarea class="input" id="problema" placeholder="Problema"></textarea>
  <textarea class="input" id="sugestao" placeholder="Sugestão"></textarea>
  <button class="botao" onclick="finalizar()">Enviar</button>
  <button class="botao voltar" onclick="mostrar('tipoTela')">Voltar</button>
</div>

<!-- FINAL -->
<div id="final" class="card tela">
  <h2>✅ Enviado</h2>
  <button class="botao" onclick="reiniciar()">Finalizar</button>
</div>

</div>

<script>
let dados = {};
let tipo = "";
let registros = JSON.parse(localStorage.getItem("registros")) || [];

function mostrar(tela) {
  document.querySelectorAll(".tela").forEach(t => t.style.display = "none");
  document.getElementById(tela).style.display = "block";

  let progresso = 20;
  if (tela === "setorTela") progresso = 40;
  if (tela === "tipoTela") progresso = 60;
  if (tela === "descricao") progresso = 80;
  if (tela === "final") progresso = 100;

  barraProgresso.style.width = progresso + "%";
}

mostrar("login");

// LOGIN
function login() {
  if (!matricula.value || !nome.value) {
    alert("Preencha tudo!");
    return;
  }
  dados = { matricula: matricula.value, nome: nome.value };
  mostrar("setorTela");
}

// ADMIN
function loginAdmin() {
  if (senhaAdmin.value === "admin123") {
    gerarDashboard();
    mostrar("dashboard");
  } else {
    alert("Senha incorreta");
  }
}

// DASHBOARD
function gerarDashboard() {
  let total = registros.length;
  indicadores.innerHTML = "Total registros: " + total;
}

// SETOR
function selecionarSetor(valor, el) {
  document.querySelectorAll(".item").forEach(i => i.classList.remove("ativo"));
  el.classList.add("ativo");

  dados.setor = valor;

  setTimeout(() => mostrar("tipoTela"), 300);
}

// TIPO
function definirTipo(t) {
  tipo = t;
  mostrar("descricao");
}

// FINALIZAR
function finalizar() {
  registros.push({ nome: dados.nome, setor: dados.setor, tipo: tipo });
  localStorage.setItem("registros", JSON.stringify(registros));
  mostrar("final");
}

// RESET
function reiniciar() {
  location.reload();
}
</script>

</body>
</html>
