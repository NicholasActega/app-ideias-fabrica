<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>ACTION</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #e5e7ea;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* TOPO */
.topo {
  width: 100%;
  background: #dcdcdc;
  text-align: center;
  padding: 15px;
  font-weight: bold;
  color: #1c4d8c;
  font-size: 22px;
}

/* CARD CENTRAL */
.container {
  margin-top: 30px;
  width: 90%;
  max-width: 420px;
}

/* BOX */
.box {
  background: white;
  border-radius: 20px;
  box-shadow: 0px 8px 20px rgba(0,0,0,0.1);
  padding: 25px;
}

/* LOGO TEXTO */
.logo-action {
  font-size: 36px;
  color: #1c78c0;
  font-style: italic;
  text-align: center;
}

/* TEXTO */
.subtexto {
  text-align: center;
  color: #666;
  margin-bottom: 20px;
}

/* INPUT ESTILO DARK */
.input {
  width: 100%;
  background: #2b2b2b;
  color: white;
  padding: 15px;
  border-radius: 10px;
  border: none;
  margin-bottom: 15px;
  font-size: 16px;
}

/* BOTÃO */
.botao {
  width: 100%;
  padding: 15px;
  border: none;
  background: #aab4bf;
  color: white;
  border-radius: 10px;
  font-size: 16px;
}

/* BOTÃO ATIVO */
.botao:hover {
  background: #0078D4;
}

/* VOLTAR */
.voltar {
  margin-top: 10px;
  background: #888;
}
</style>
</head>

<body>

<div class="topo">ACTEGA</div>

<div class="container">

<!-- LOGIN -->
<div id="login" class="box">

  <div class="logo-action">ACTION</div>

  <div class="subtexto">
    Identifique-se para iniciar o registro.
  </div>

  <input class="input" id="matricula" placeholder="Matrícula">

  <input class="input" id="nome" placeholder="Nome completo">

  <button class="botao" onclick="login()">Continuar</button>

</div>

<!-- SETOR -->
<div id="setorTela" class="box" style="display:none;">

  <h3>Selecione o setor</h3>

  <select id="setor" class="input">
    <option>Tintas</option>
    <option>Vernizes</option>
    <option>Logística</option>
    <option>Laboratório</option>
    <option>ADM</option>
    <option>PCP</option>
    <option>Manutenção</option>
  </select>

  <button class="botao" onclick="proximo('tipoTela')">Continuar</button>
  <button class="botao voltar" onclick="voltar('login')">Voltar</button>

</div>

<!-- TIPO -->
<div id="tipoTela" class="box" style="display:none;">

  <h3>Tipo de registro</h3>

  <button class="botao" onclick="definirTipo('Ideia')">💡 Ideia</button>
  <button class="botao" onclick="definirTipo('Risco')">⚠️ Risco</button>

  <button class="botao voltar" onclick="voltar('setorTela')">Voltar</button>

</div>

<!-- DESCRIÇÃO -->
<div id="descricao" class="box" style="display:none;">

  <h3>Descreva</h3>

  <textarea class="input" id="problema" placeholder="Problema"></textarea>
  <textarea class="input" id="sugestao" placeholder="Sugestão"></textarea>

  <button class="botao" onclick="finalizar()">Enviar</button>
  <button class="botao voltar" onclick="voltar('tipoTela')">Voltar</button>

</div>

<!-- FINAL -->
<div id="final" class="box" style="display:none;">

  <h2>✅ Enviado</h2>
  <p>+10 pontos</p>

  <button class="botao" onclick="reiniciar()">Finalizar</button>

</div>

</div>

<script>
let dados = {};
let tipo = "";

function login() {
  if (!matricula.value || !nome.value) {
    alert("Preencha os dados");
    return;
  }

  dados.matricula = matricula.value;
  dados.nome = nome.value;

  mostrar("setorTela");
}

function definirTipo(t) {
  tipo = t;
  mostrar("descricao");
}

function proximo(tela) {
  dados.setor = setor.value;
  mostrar(tela);
}

function finalizar() {
  if (problema.value.length < 10) {
    alert("Descreva melhor");
    return;
  }

  mostrar("final");
}

function reiniciar() {
  location.reload();
}

function mostrar(tela) {
  document.querySelectorAll(".box").forEach(t => t.style.display = "none");
  document.getElementById(tela).style.display = "block";
}

function voltar(tela) {
  mostrar(tela);
}
</script>

</body>
</html>
