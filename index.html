<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>ACTION</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #e6eef7;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* HEADER */
.header {
  background: #0a2f5c;
  color: white;
  width: 100%;
  text-align: center;
  padding: 15px;
  font-size: 28px;
  font-weight: bold;
}

/* LOGO */
.logo-area {
  background: white;
  width: 100%;
  text-align: center;
  padding: 15px;
}

.logo-area img {
  max-height: 60px;
}

/* CONTAINER */
.container {
  width: 95%;
  max-width: 500px;
  margin-top: 20px;
}

/* CARDS */
.card {
  background: white;
  padding: 20px;
  border-radius: 12px;
  margin-bottom: 15px;
}

/* INPUT */
input, textarea, select {
  width: 100%;
  box-sizing: border-box;
  padding: 15px;
  font-size: 18px;
  margin-top: 10px;
}

/* BOTÕES */
button {
  width: 100%;
  padding: 18px;
  font-size: 18px;
  margin-top: 10px;
  border: none;
  border-radius: 10px;
  background: #0078D4;
  color: white;
  font-weight: bold;
}

.btn-sec {
  background: #5a9bd5;
}

.btn-danger {
  background: #d9534f;
}

.btn-voltar {
  background: #6c757d;
}

/* TELAS */
.tela {
  display: none;
}
</style>
</head>

<body>

<div class="header">ACTION</div>

<div class="logo-area">
  <!-- COLOQUE SEU LOGO AQUI -->
  <img src="https://via.placeholder.com/200x60?text=LOGO">
</div>

<div class="container">

<!-- LOGIN -->
<div id="login" class="tela">
  <div class="card">
    <h2>Login</h2>
    <input id="matricula" placeholder="Matrícula">
    <input id="nome" placeholder="Nome completo">

    <button onclick="login()">Entrar</button>
    <button class="btn-sec" onclick="suporte()">Preciso de Ajuda</button>

    <hr>
    <button class="btn-danger" onclick="mostrar('adminLogin')">Admin</button>
  </div>
</div>

<!-- ADMIN LOGIN -->
<div id="adminLogin" class="tela">
  <div class="card">
    <h2>Admin</h2>
    <input type="password" id="senhaAdmin" placeholder="Senha">
    <button onclick="loginAdmin()">Entrar</button>

    <button class="btn-voltar" onclick="mostrar('login')">⬅ Voltar</button>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="tela">
  <div class="card">
    <h2>📊 Dashboard</h2>
    <div id="indicadores"></div>
  </div>

  <div class="card">
    <h3>Registros</h3>
    <div id="listaRegistros"></div>
  </div>

  <button class="btn-voltar" onclick="mostrar('login')">⬅ Voltar</button>
</div>

<!-- SETOR -->
<div id="setorTela" class="tela">
  <div class="card">
    <h2>Setor</h2>
    <select id="setor">
      <option>Tintas</option>
      <option>Vernizes</option>
      <option>Logística</option>
      <option>Laboratório</option>
      <option>ADM</option>
      <option>PCP</option>
      <option>Manutenção</option>
    </select>

    <button onclick="proximo('tipoTela')">Avançar</button>
    <button class="btn-voltar" onclick="mostrar('login')">⬅ Voltar</button>
  </div>
</div>

<!-- TIPO -->
<div id="tipoTela" class="tela">
  <div class="card">
    <h2>Selecione</h2>

    <button onclick="definirTipo('Ideia')">💡 Ideia</button>
    <button class="btn-danger" onclick="definirTipo('Risco')">⚠️ Risco</button>

    <button class="btn-voltar" onclick="mostrar('setorTela')">⬅ Voltar</button>
  </div>
</div>

<!-- DESCRIÇÃO -->
<div id="descricao" class="tela">
  <div class="card">
    <h2>Descreva</h2>

    <textarea id="problema" placeholder="Problema"></textarea>
    <textarea id="sugestao" placeholder="Sugestão"></textarea>

    <input type="file" id="foto">

    <button onclick="finalizar()">Enviar</button>
    <button class="btn-voltar" onclick="mostrar('tipoTela')">⬅ Voltar</button>
  </div>
</div>

<!-- FINAL -->
<div id="final" class="tela">
  <div class="card">
    <h2>✅ Enviado!</h2>
    <p>+10 pontos 🎉</p>

    <button onclick="reiniciar()">Finalizar</button>
  </div>
</div>

</div>

<script>
let dados = {};
let tipo = "";
let registros = JSON.parse(localStorage.getItem("registros")) || [];

function mostrar(tela) {
  document.querySelectorAll(".tela").forEach(t => t.style.display = "none");
  document.getElementById(tela).style.display = "block";
}

mostrar("login");

// LOGIN
function login() {
  if (!matricula.value || !nome.value) {
    alert("Preencha tudo");
    return;
  }

  dados = { matricula: matricula.value, nome: nome.value };
  mostrar("setorTela");
}

// ADMIN LOGIN
function loginAdmin() {
  if (senhaAdmin.value === "admin123") {
    gerarDashboard();
    mostrar("dashboard");
  } else {
    alert("Senha incorreta");
  }
}

// DASHBOARD
function gerarDashboard() {
  let total = registros.length;
  let ideias = registros.filter(r => r.tipo === "Ideia").length;
  let riscos = registros.filter(r => r.tipo === "Risco").length;

  indicadores.innerHTML = `
    <div class="card">Total de envios: ${total}</div>
    <div class="card">Ideias: ${ideias}</div>
    <div class="card">Riscos: ${riscos}</div>
  `;

  let lista = "";
  registros.forEach(r => {
    lista += `<div class="card">
      ${r.id} | ${r.nome}<br>
      ${r.setor} - ${r.tipo}<br>
      ${r.problema}
    </div>`;
  });

  listaRegistros.innerHTML = lista;
}

// FLUXO
function proximo(tela) {
  dados.setor = setor.value;
  mostrar(tela);
}

function definirTipo(t) {
  tipo = t;
  mostrar("descricao");
}

// VALIDAÇÃO
function validarTexto(t) {
  if (t.length < 15) return true;
  return false;
}

// FINALIZAR
function finalizar() {
  if (validarTexto(problema.value) || validarTexto(sugestao.value)) {
    alert("Descreva melhor o problema e sugestão");
    return;
  }

  let novo = {
    id: "ID-" + (registros.length + 1),
    nome: dados.nome,
    setor: dados.setor,
    tipo: tipo,
    problema: problema.value,
    sugestao: sugestao.value
  };

  registros.push(novo);
  localStorage.setItem("registros", JSON.stringify(registros));

  mostrar("final");
}

// RESET
function reiniciar() {
  matricula.value = "";
  nome.value = "";
  problema.value = "";
  sugestao.value = "";

  mostrar("login");
}

// SUPORTE
function suporte() {
  window.location.href = "mailto:SEUEMAIL@empresa.com";
}
</script>

</body>
</html>
